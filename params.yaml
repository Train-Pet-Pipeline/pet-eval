gates:
  vlm:
    schema_compliance: 0.99
    distribution_sum_error: 0.01
    anomaly_recall: 0.85
    anomaly_false_positive: 0.15
    mood_spearman: 0.75
    narrative_bertscore: 0.80
    latency_p95_ms: 4000
    kl_divergence: 0.02
  audio:
    overall_accuracy: 0.80
    vomit_recall: 0.70

benchmark:
  gold_set_path: "benchmark/gold_set_v2.jsonl"
  anomaly_set_path: "benchmark/anomaly_set_v1.jsonl"
  teacher_reference_path: "benchmark/teacher_references_v1.jsonl"
  audio_test_dir: ""

inference:
  schema_version: "1.0"
  max_new_tokens: 1024
  batch_size: 1
  temperature: 0.1
  top_p: 0.9
  do_sample: true
  retry_on_failure: true        # 输出不合规时用更高 temperature 重试一次
  retry_temperature: 0.7
  constrained_decoding: false   # 启用后使用 outlines 库进行 JSON Schema 约束采样
  prompt_source: "pet_schema"   # "gold_set": 用 gold_set 自带 prompt; "pet_schema": 用 pet_schema 标准短 prompt
  eval_images_dir: ""  # path to images for quantized eval; falls back to calibration output

audio:
  sample_rate: 16000
  classes:
    - "eating"
    - "drinking"
    - "vomiting"
    - "ambient"
    - "other"

device:
  adb_timeout: 30
  warmup_runs: 3
  latency_runs: 50
