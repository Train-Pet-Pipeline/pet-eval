name: peer-dep-smoke

on:
  pull_request:
    branches: [dev, main]

jobs:
  install-order-smoke:
    runs-on: ubuntu-latest
    env:
      PET_ALLOW_MISSING_SDK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Step 1 — install pet-schema (peer-dep, Phase 4 v2.4.0-rc1)
        run: pip install 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v2.4.0-rc1'

      - name: Step 2 — install pet-infra (peer-dep, Phase 4 v2.5.0-rc1)
        run: pip install 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.5.0-rc1'

      - name: Step 3 — install pet-train (cross-repo runtime, matrix 2026.08)
        run: pip install 'pet-train @ git+https://github.com/Train-Pet-Pipeline/pet-train@v2.0.0'

      - name: Step 4 — install pet-quantize (cross-repo runtime, matrix 2026.08)
        run: pip install 'pet-quantize @ git+https://github.com/Train-Pet-Pipeline/pet-quantize@v2.0.0'

      - name: Step 5 — install pet-eval editable, no-deps
        run: pip install -e . --no-deps

      - name: Step 6 — re-resolve dev extras
        run: pip install -e ".[dev]"

      - name: Step 7 — re-pin pet-schema + pet-infra (last-wins; pet-quantize v2.0.0 transitively pins older versions)
        run: |
          pip install --upgrade --force-reinstall --no-deps 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v2.4.0-rc1'
          pip install --upgrade --force-reinstall --no-deps 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.5.0-rc1'

      - name: Step 8 — assert peer-dep versions (§11.4)
        run: |
          python -c "import importlib.metadata as m; v=m.version('pet-schema'); assert v.startswith('2.4'), f'unexpected pet-schema version {v}'"
          python -c "import importlib.metadata as m; v=m.version('pet-infra'); assert v.startswith('2.5'), f'unexpected pet-infra version {v}'"
          python -c "import pet_train; import pet_train.audio.inference"
          python -c "import importlib.metadata as m; v=m.version('pet-quantize'); assert v.startswith('2.'), f'unexpected pet-quantize version {v}'"

      - name: Smoke — register_all populates METRICS + EVALUATORS
        run: |
          python -c "
          from pet_eval.plugins._register import register_all
          register_all()
          from pet_infra.registry import METRICS, EVALUATORS
          expected_metrics = {'anomaly_recall', 'audio_accuracy', 'calibration', 'kl_quantization',
                              'latency', 'mood_correlation', 'narrative_quality', 'schema_compliance'}
          expected_evals = {'vlm_evaluator', 'audio_evaluator', 'quantized_vlm_evaluator'}
          got_metrics = set(METRICS.module_dict.keys())
          got_evals = set(EVALUATORS.module_dict.keys())
          assert expected_metrics <= got_metrics, f'missing metrics: {expected_metrics - got_metrics}'
          assert expected_evals <= got_evals, f'missing evaluators: {expected_evals - got_evals}'
          print(f'OK 8 metrics registered: {sorted(expected_metrics)}')
          print(f'OK 3 evaluators registered: {sorted(expected_evals)}')"

      - name: Smoke — pet_eval entry-point discoverable
        run: |
          python -c "
          from importlib.metadata import entry_points
          eps = entry_points(group='pet_infra.plugins')
          names = {ep.name for ep in eps}
          assert 'pet_eval' in names, f'pet_eval entry-point missing; got: {names}'
          print(f'OK pet_eval entry-point discoverable: group=pet_infra.plugins')"

      - name: Smoke — cross-repo import chain works
        run: |
          python -c "
          from pet_train.audio.inference import AudioInference, AudioPrediction, CLASSES
          from pet_eval.plugins.audio_evaluator import AudioEvaluator
          assert len(CLASSES) == 5
          assert AudioEvaluator is not None
          print('OK pet_train.audio.inference → pet_eval.plugins.audio_evaluator import chain')"
