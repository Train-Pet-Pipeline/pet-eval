name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  repository_dispatch:
    types: [schema-updated]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      PET_ALLOW_MISSING_SDK: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git for private repos
        run: git config --global url."https://x-access-token:${{ secrets.CROSS_REPO_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libsndfile1

      - name: Step 1 — install pet-schema (peer-dep, Phase 4 v2.4.0)
        run: pip install 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v2.4.0'

      - name: Step 2 — install pet-infra (peer-dep, Phase 4 v2.5.0)
        run: pip install 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.5.0'

      - name: Step 3 — install pet-train (cross-repo runtime for AudioEvaluator, matrix 2026.08)
        run: pip install 'pet-train @ git+https://github.com/Train-Pet-Pipeline/pet-train@v2.0.0'

      - name: Step 4 — install pet-quantize (cross-repo runtime for QuantizedVlmEvaluator, matrix 2026.08)
        run: pip install 'pet-quantize @ git+https://github.com/Train-Pet-Pipeline/pet-quantize@v2.0.0'

      - name: Step 5 — install pet-eval editable + dev extras (no-deps preserves peer-dep pins)
        run: pip install -e ".[dev]" --no-deps

      - name: Step 6 — re-resolve remaining deps
        run: pip install -e ".[dev]"

      - name: Step 7 — re-pin pet-schema + pet-infra (last-wins; pet-quantize v2.0.0 transitively pins older versions)
        run: |
          pip install --upgrade --force-reinstall --no-deps 'pet-schema @ git+https://github.com/Train-Pet-Pipeline/pet-schema@v2.4.0'
          pip install --upgrade --force-reinstall --no-deps 'pet-infra @ git+https://github.com/Train-Pet-Pipeline/pet-infra@v2.5.0'

      - name: Step 8 — assert peer-dep versions (§11.4)
        run: |
          python -c "import importlib.metadata as m; v=m.version('pet-schema'); assert v.startswith('2.4'), f'unexpected pet-schema version {v}'"
          python -c "import importlib.metadata as m; v=m.version('pet-infra'); assert v.startswith('2.5'), f'unexpected pet-infra version {v}'"
          python -c "import pet_train; import pet_train.audio.inference"
          python -c "import importlib.metadata as m; v=m.version('pet-quantize'); assert v.startswith('2.'), f'unexpected pet-quantize version {v}'"

      - name: Lint
        run: ruff check src/ tests/ && mypy src/

      - name: Detect GPU
        id: gpu
        run: |
          if python -c "import torch; assert torch.cuda.is_available()" 2>/dev/null; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Test
        run: |
          if [ "${{ steps.gpu.outputs.available }}" = "true" ]; then
            pytest tests/ -v --tb=short
          else
            pytest tests/ -v --tb=short -m "not gpu"
          fi
